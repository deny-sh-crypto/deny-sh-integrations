name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --include=dev
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

  python-langchain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/langchain-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest pydantic
      - run: PYTHONPATH=src python -m pytest tests/ -q

  python-openai-agents:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/openai-agents-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest pydantic openai-agents
      - run: PYTHONPATH=src python -m pytest tests/ -q
